<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💗 กดดูตรงนี้เร็ว 💗</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#fff5f7,#ffe4ec,#ffd6e7);
}

.page{
width:90%;
max-width:650px;
background:rgba(255,255,255,0.9);
padding:40px;
border-radius:30px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.1);
position:relative;
z-index:2;
}

.hidden{
display:none;
}

h1{
color:#ff7aa8;
font-size:42px;
margin-bottom:20px;
}

p{
font-size:22px;
line-height:1.8;
color:#666;
}

button{
margin-top:25px;
padding:14px 35px;
border:none;
border-radius:40px;
background:#ff9fbe;
color:white;
font-size:20px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

.heart{
position:absolute;
bottom:-30px;
font-size:25px;
animation:float 6s linear infinite;
opacity:.8;
}

@keyframes float{
from{
transform:translateY(0);
opacity:1;
}
to{
transform:translateY(-110vh);
opacity:0;
}
}

.flower{
font-size:35px;
position:absolute;
}

.fl1{
top:20px;
left:20px;
}

.fl2{
top:20px;
right:20px;
}

.fl3{
bottom:20px;
left:20px;
}

.fl4{
bottom:20px;
right:20px;
}
</style>
</head>
<body>

<div class="page" id="page1">

<div class="flower fl1">🌸</div>
<div class="flower fl2">🌷</div>
<div class="flower fl3">🌸</div>
<div class="flower fl4">🌷</div>

<h1>💌 กดดูตรงนี้เร็ว 💌</h1>

<button onclick="showMessage()">
กดเลย 💗
</button>

</div>

<div class="page hidden" id="page2">

<div class="flower fl1">🌸</div>
<div class="flower fl2">🌷</div>
<div class="flower fl3">🌸</div>
<div class="flower fl4">🌷</div>

<h1>🌷 สู้ๆ นะ 🌷</h1>

<p>
ตั้งใจทำงานนะคะ<br><br>

คิดถึงน้าาาา<br>

💕<br>

เป็นกำลังใจให้นะค้าบบบ 💗
</p>

</div>

<script>

function showMessage(){
document.getElementById("page1").classList.add("hidden");
document.getElementById("page2").classList.remove("hidden");
}

function createHeart(){

const heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="💗";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(20+Math.random()*20)+"px";
heart.style.animationDuration=(4+Math.random()*4)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},8000);

}

setInterval(createHeart,500);

</script>

</body>
</html>
